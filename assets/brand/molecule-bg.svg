<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <!-- Decorative chemical structure (stylized, not a real compound) -->
  <g stroke="#c9a227" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
    <!-- Hexagon ring A -->
    <path d="M120 200 L170 170 L220 200 L220 260 L170 290 L120 260 Z"/>
    <!-- Hexagon ring B fused -->
    <path d="M220 200 L270 170 L320 200 L320 260 L270 290 L220 260"/>
    <!-- Bond extensions -->
    <path d="M170 170 L170 120"/>
    <path d="M270 170 L300 130"/>
    <path d="M320 230 L380 210"/>
    <path d="M380 210 L420 240 L400 290 L340 300"/>
    <path d="M120 230 L70 210"/>
    <path d="M70 210 L40 250 L60 300"/>
    <path d="M170 290 L170 350 L210 380"/>
    <path d="M270 290 L300 340 L280 390"/>
    <!-- Second structure (right) -->
    <path d="M520 180 L570 150 L620 180 L620 240 L570 270 L520 240 Z"/>
    <path d="M570 150 L570 100 M620 210 L680 190 M680 190 L710 230 L690 280"/>
    <path d="M520 210 L470 190 M470 190 L440 230 L460 280"/>
    <path d="M570 270 L570 330 L610 360 M520 240 L480 290"/>
    <!-- Third structure (bottom left) -->
    <circle cx="200" cy="480" r="18"/>
    <path d="M200 462 L200 420 L240 400 M200 498 L200 540 M218 470 L260 450 M182 470 L140 450 M218 490 L260 510 M182 490 L140 510"/>
    <!-- atoms as small nodes -->
  </g>
  <g fill="#c9a227" opacity="0.85">
    <circle cx="170" cy="120" r="4"/>
    <circle cx="300" cy="130" r="4"/>
    <circle cx="380" cy="210" r="4"/>
    <circle cx="400" cy="290" r="4"/>
    <circle cx="70" cy="210" r="4"/>
    <circle cx="60" cy="300" r="4"/>
    <circle cx="210" cy="380" r="4"/>
    <circle cx="280" cy="390" r="4"/>
    <circle cx="570" cy="100" r="4"/>
    <circle cx="680" cy="190" r="4"/>
    <circle cx="690" cy="280" r="4"/>
    <circle cx="470" cy="190" r="4"/>
    <circle cx="460" cy="280" r="4"/>
    <circle cx="610" cy="360" r="4"/>
    <circle cx="480" cy="290" r="4"/>
    <circle cx="240" cy="400" r="3.5"/>
    <circle cx="200" cy="540" r="3.5"/>
    <circle cx="260" cy="450" r="3.5"/>
    <circle cx="140" cy="450" r="3.5"/>
    <circle cx="260" cy="510" r="3.5"/>
    <circle cx="140" cy="510" r="3.5"/>
